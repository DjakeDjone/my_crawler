name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CRAWLER_PRODUCT_TOKEN: CI
      CRAWLER_USER_AGENT: CI/1.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: docker compose config >/dev/null

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      CRAWLER_PRODUCT_TOKEN: CI
      CRAWLER_USER_AGENT: CI/1.0
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          tags: ghcr.io/djakedjone/my_crawler-api:latest
          cache-from: type=gha,scope=rust-release
          cache-to: type=gha,scope=rust-release,mode=max
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: spider
          push: true
          tags: ghcr.io/djakedjone/my_crawler-spider:latest
          cache-from: type=gha,scope=rust-release
          cache-to: type=gha,scope=rust-release,mode=max
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.HETZNER_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
      - name: Deploy
        run: |
          rsync -az --delete --exclude .env --exclude .git --exclude target ./ \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/my_crawler/"
          ssh "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" '
            set -eu
            cd /opt/my_crawler
            test -s .env
            docker compose pull api spider
            docker compose up -d --wait --remove-orphans
            docker image prune -f
          '
